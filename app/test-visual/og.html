<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>OG Image</title>
  <style>
    body { margin: 0; padding: 0; background: #040810; }
  </style>
</head>
<body>
  <div id="og" style="width: 1200px; height: 630px; display: flex; align-items: center; justify-content: center; background: #040810; font-family: monospace; position: relative;">
    <!-- Grid overlay -->
    <div style="position: absolute; inset: 0; background-image: linear-gradient(rgba(110,255,160,.03) 1px, transparent 1px), linear-gradient(90deg, rgba(110,255,160,.03) 1px, transparent 1px); background-size: 32px 32px; opacity: 0.5;"></div>

    <!-- Left: Maya avatar -->
    <div style="display: flex; align-items: center; justify-content: center; width: 460px; height: 460px; position: relative;">
      <img src="../src/app/icon.svg" width="384" height="384" style="image-rendering: pixelated;" />
      <div style="position: absolute; width: 300px; height: 300px; background: radial-gradient(circle, rgba(110,255,160,0.12) 0%, transparent 70%); top: 80px; left: 80px;"></div>
    </div>

    <!-- Right: Title + tagline -->
    <div style="display: flex; flex-direction: column; justify-content: center; padding-left: 40px; max-width: 620px;">
      <div style="font-size: 72px; font-weight: 900; color: #6effa0; letter-spacing: 8px; line-height: 1; font-family: monospace; text-shadow: 0 0 40px rgba(110,255,160,0.4);">SIGNAL</div>
      <div style="font-size: 22px; color: #b8d4a0; margin-top: 20px; line-height: 1.5; font-family: monospace;">Learn Go by keeping someone alive.</div>
      <div style="font-size: 14px; color: #1a5a4a; margin-top: 16px; line-height: 1.6; font-family: monospace; max-width: 500px;">A narrative coding game where every challenge is a real Go problem and every line you write matters.</div>
      <!-- Terminal prompt -->
      <div style="display: flex; align-items: center; gap: 8px; margin-top: 32px; font-size: 14px; font-family: monospace;">
        <span style="color: #1a5a4a;">$</span>
        <span style="color: #6effa0;">go run signal.go</span>
        <span style="width: 8px; height: 16px; background: #6effa0; opacity: 0.7; display: inline-block;"></span>
      </div>
    </div>
  </div>
</body>
</html>
